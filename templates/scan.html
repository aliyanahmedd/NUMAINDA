<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scanning {{ target }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* subtle dot grid */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, rgba(47,159,222,0.08) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none; opacity: 0.5;
    }

    .wrap { width: 100%; max-width: 720px; position: relative; z-index: 1; }

    header { margin-bottom: 1.5rem; }

    .scan-label { font-size: 0.75rem; color: #94a3b8; margin-bottom: 0.3rem; text-transform: uppercase; letter-spacing: 0.08em; }

    .target { font-size: 1.4rem; font-weight: 700; color: #0f172a; font-family: 'SF Mono','Consolas',monospace; }

    .progress-wrap { margin-bottom: 1.25rem; }

    .phase-bar {
      display: flex; gap: 3px; margin-bottom: 0.5rem;
    }

    .phase-seg {
      flex: 1; height: 4px; background: #e2e8f0; border-radius: 2px;
      transition: background 0.3s;
    }

    .phase-seg.done    { background: #22c55e; }
    .phase-seg.active  { background: #2f9fde; animation: pulse 1.2s ease-in-out infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .phase-info {
      font-size: 0.82rem; color: #64748b;
    }

    .phase-info span { color: #2f9fde; font-weight: 600; }

    .terminal {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(47,159,222,0.12), 0 2px 8px rgba(15,23,42,0.08);
    }

    .term-header {
      background: #1e293b;
      border-bottom: 1px solid #283549;
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .dots { display:flex; gap:6px; }
    .dot  { width:11px; height:11px; border-radius:50%; }
    .dot-r { background:#ff5f56; }
    .dot-y { background:#ffbd2e; }
    .dot-g { background:#27c93f; }

    .term-title { font-size: 0.78rem; color: #64748b; font-family: monospace; margin: 0 auto; }

    .status-pill {
      font-size: 0.7rem; padding: 0.15rem 0.55rem; border-radius: 20px;
      font-family: monospace; font-weight: 600; border: 1px solid;
    }

    .status-pill.running { color: #7dd3fc; border-color: #1e3a5f; background: #0d2238; }
    .status-pill.done    { color: #4ade80; border-color: #14532d; background: #052e16; }
    .status-pill.error   { color: #f87171; border-color: #7f1d1d; background: #450a0a; }

    .term-body {
      padding: 1rem;
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 0.8rem;
      line-height: 1.75;
      height: 380px;
      overflow-y: auto;
      color: #94a3b8;
    }

    .term-body::-webkit-scrollbar { width: 4px; }
    .term-body::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    .log-line { display:flex; gap:0.5rem; }
    .log-prefix { color: #475569; user-select:none; }
    .log-info    { color: #38bdf8; }
    .log-success { color: #4ade80; }
    .log-warn    { color: #fbbf24; }
    .log-error   { color: #f87171; }
    .log-plain   { color: #64748b; }

    .cursor {
      display:inline-block; width:7px; height:0.9em;
      background:#38bdf8; vertical-align:text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .done-notice {
      text-align:center; margin-top:1rem;
      font-size:0.85rem; color:#64748b; display:none;
    }
    .done-notice a { color:#2f9fde; font-weight:600; }

    .error-box {
      margin-top:1rem; padding:0.875rem 1rem;
      background:#fef2f2; border:1px solid #fecaca;
      border-radius:8px; font-size:0.82rem; color:#dc2626; display:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="scan-label">Scanning</p>
      <p class="target">{{ target }}</p>
    </header>

    <div class="progress-wrap">
      <div class="phase-bar" id="phases">
        {% for i in range(14) %}<div class="phase-seg" id="phase-{{ i }}"></div>{% endfor %}
      </div>
      <p class="phase-info" id="phase-label">Initializing<span id="phase-num"></span></p>
    </div>

    <div class="terminal">
      <div class="term-header">
        <div class="dots">
          <span class="dot dot-r"></span>
          <span class="dot dot-y"></span>
          <span class="dot dot-g"></span>
        </div>
        <span class="term-title">osint-agent · {{ target }}</span>
        <span class="status-pill running" id="status-pill">Running</span>
      </div>
      <div class="term-body" id="log">
        <div class="log-line">
          <span class="log-prefix">$</span>
          <span class="log-info">python app.py {{ target }}</span>
        </div>
        <div class="log-line" id="cursor-line">
          <span class="log-prefix"> </span>
          <span class="log-plain"><span class="cursor"></span></span>
        </div>
      </div>
    </div>

    <div class="error-box" id="error-box"></div>
    <p class="done-notice" id="done-notice">
      Complete. <a href="/scan/{{ scan_id }}/results">View results</a>
    </p>
  </div>

  <script>
    const scanId = "{{ scan_id }}";
    const phases = document.querySelectorAll('.phase-seg');
    const phaseLabel = document.getElementById('phase-label');
    const statusPill = document.getElementById('status-pill');
    const log = document.getElementById('log');
    let currentPhase = -1;

    const PHASE_MAP = {
      '[DNS]':0,'[EMAIL]':1,'[SUB]':2,'[GEO]':3,'[PORT]':4,
      '[BREACH]':5,'[TECH]':6,'[SSL]':7,'[CVE]':8,'[THREAT]':9,
      '[PASTE]':10,'[SOCIAL]':11,'[SCORE]':12,'[AI]':13,
      '[RDNS]':0,
    };

    const PHASE_NAMES = [
      'DNS & WHOIS','Email Discovery','Subdomain Enum','IP Geolocation',
      'Port Scanning','Breach Check','Tech Stack','SSL Certificate',
      'CVE Lookup','Threat Intel','Paste Search','Social Media',
      'Risk Scoring','AI Analysis'
    ];

    function lineClass(t) {
      if (t.startsWith('[+]')) return 'log-success';
      if (t.startsWith('[*]')) return 'log-info';
      if (t.startsWith('[!]')) return 'log-warn';
      if (t.startsWith('[✗]')) return 'log-error';
      return 'log-plain';
    }

    function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function appendLine(text) {
      const cl = document.getElementById('cursor-line');
      if (cl) cl.remove();
      const div = document.createElement('div');
      div.className = 'log-line';
      div.innerHTML = `<span class="log-prefix">›</span><span class="${lineClass(text)}">${esc(text)}</span>`;
      log.appendChild(div);
      const c = document.createElement('div');
      c.id = 'cursor-line'; c.className = 'log-line';
      c.innerHTML = '<span class="log-prefix"> </span><span class="log-plain" id="cursor-line"><span class="cursor"></span></span>';
      log.appendChild(c);
      log.scrollTop = log.scrollHeight;
    }

    function updatePhase(text) {
      for (const [prefix, idx] of Object.entries(PHASE_MAP)) {
        if (text.startsWith(prefix)) {
          for (let i = 0; i < idx; i++) phases[i].className = 'phase-seg done';
          phases[idx].className = 'phase-seg active';
          currentPhase = idx;
          phaseLabel.innerHTML = `Phase ${idx+1}/14: <span>${PHASE_NAMES[idx]}</span>`;
          break;
        }
      }
      if (text.startsWith('[+]') && currentPhase >= 0) {
        phases[currentPhase].className = 'phase-seg done';
      }
    }

    const es = new EventSource(`/scan/${scanId}/stream`);
    es.onmessage = function(e) {
      const data = e.data;
      if (data === '__PING__') return;
      if (data === '__DONE__') {
        es.close();
        phases.forEach(p => p.className = 'phase-seg done');
        phaseLabel.innerHTML = 'Scan complete: <span>all phases done</span>';
        statusPill.textContent = 'Done';
        statusPill.className = 'status-pill done';
        document.getElementById('done-notice').style.display = 'block';
        document.getElementById('cursor-line')?.remove();
        setTimeout(() => { window.location.href = `/scan/${scanId}/results`; }, 1500);
        return;
      }
      if (data.startsWith('__ERROR__')) {
        es.close();
        const msg = data.replace('__ERROR__','');
        statusPill.textContent = 'Error';
        statusPill.className = 'status-pill error';
        const box = document.getElementById('error-box');
        box.style.display = 'block';
        box.textContent = 'Error: ' + msg;
        appendLine('[✗] ' + msg);
        return;
      }
      updatePhase(data);
      appendLine(data);
    };
  </script>
</body>
</html>
